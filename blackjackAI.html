<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blackjack</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    #bj { font-family: 'DM Sans', sans-serif; background: #0d4a2a; min-height: 600px; border-radius: 16px; padding: 24px; color: #f0ead2; position: relative; overflow: hidden; width: 100%; max-width: 620px; }
    #bj::before { content: ''; position: absolute; inset: 12px; border: 2px solid rgba(255,220,100,0.3); border-radius: 12px; pointer-events: none; }
    .title { font-family: 'Playfair Display', serif; text-align: center; font-size: 30px; color: #ffd700; letter-spacing: 2px; margin-bottom: 6px; }
    .balance-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 14px; background: rgba(0,0,0,0.35); border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
    .balance-bar span { color: #ffd700; font-weight: 500; font-size: 16px; }
    .hand-area { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 12px 16px; margin-bottom: 12px; min-height: 128px; }
    .hand-label { font-size: 12px; color: rgba(240,234,210,0.6); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .cards-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; min-height: 88px; }
    .card { width: 60px; height: 88px; background: #fff; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; border: 1px solid #ccc; flex-shrink: 0; }
    .card.red { color: #c0392b; }
    .card.black { color: #1a1a1a; }
    .card.hidden { background: repeating-linear-gradient(135deg,#1a6b3a 0,#1a6b3a 8px,#165c32 8px,#165c32 16px); border-color: #0d4a2a; }
    .card-rank { font-size: 17px; line-height: 1; }
    .card-suit { font-size: 21px; line-height: 1; }
    .score-badge { display: inline-block; background: rgba(255,215,0,0.15); color: #ffd700; border: 1px solid rgba(255,215,0,0.4); border-radius: 20px; padding: 3px 11px; font-size: 13px; font-weight: 500; margin-left: 8px; }
    .result-banner { text-align: center; font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; padding: 8px; margin-bottom: 10px; border-radius: 8px; }
    .result-banner.win { color: #ffd700; background: rgba(255,215,0,0.1); }
    .result-banner.lose { color: #e74c3c; background: rgba(231,76,60,0.1); }
    .result-banner.push { color: #f0ead2; background: rgba(240,234,210,0.1); }
    .controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 12px; }
    .btn { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; padding: 9px 22px; border-radius: 6px; border: none; cursor: pointer; transition: all 0.15s; }
    .btn:active { transform: scale(0.96); }
    .btn-gold { background: #ffd700; color: #1a1a1a; }
    .btn-gold:hover { background: #f0c800; }
    .btn-outline { background: transparent; border: 1.5px solid rgba(240,234,210,0.5); color: #f0ead2; }
    .btn-outline:hover { background: rgba(240,234,210,0.1); }
    .btn-red { background: #c0392b; color: #fff; }
    .btn-red:hover { background: #a93226; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    .bet-area { display: flex; gap: 8px; justify-content: center; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
    .chip { width: 50px; height: 50px; border-radius: 50%; border: 3px dashed rgba(255,255,255,0.5); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; cursor: pointer; transition: transform 0.15s; color: #fff; }
    .chip:hover { transform: scale(1.1); }
    .chip.c5 { background: #e74c3c; }
    .chip.c10 { background: #2980b9; }
    .chip.c25 { background: #27ae60; }
    .chip.c50 { background: #8e44ad; }
    .chip.c100 { background: #e67e22; }
    .bet-display { font-size: 14px; color: rgba(240,234,210,0.7); text-align: center; }
    .bet-display span { color: #ffd700; font-size: 18px; font-weight: 500; }
    .test-hands { background: rgba(0,0,0,0.16); border-radius: 8px; padding: 9px; margin-top: 10px; }
    .test-title { color: rgba(240,234,210,0.62); font-size: 11px; text-align: center; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 7px; }
    .test-buttons { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
    .test-btn { font-size: 11px; padding: 6px 9px; }
    .ai-panel { display: none; background: rgba(0,0,0,0.24); border: 1px solid rgba(255,215,0,0.22); border-radius: 8px; padding: 10px; margin-top: 12px; }
    .ai-panel.visible { display: block; }
    .ai-header { display: flex; justify-content: space-between; align-items: center; gap: 8px; color: #ffd700; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .ai-header span { color: rgba(240,234,210,0.58); letter-spacing: 0; text-transform: none; }
    .ai-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .ai-table th { color: rgba(240,234,210,0.55); font-weight: 500; text-align: right; padding: 4px 3px; }
    .ai-table th:first-child, .ai-table td:first-child { text-align: left; }
    .ai-table td { color: #f0ead2; text-align: right; padding: 4px 3px; border-top: 1px solid rgba(240,234,210,0.08); }
    .ai-table tr.recommended td { color: #ffd700; font-weight: 700; }
    .ai-recommendation { color: #ffd700; font-size: 12px; margin-top: 8px; text-align: center; }
    .ai-explanation { color: rgba(240,234,210,0.62); font-size: 11px; line-height: 1.35; margin-top: 8px; text-align: center; }
    .msg { text-align: center; font-size: 12px; color: rgba(240,234,210,0.5); margin-top: 6px; }
  </style>
</head>
<body>
<div id="bj">
  <div class="title">&spades; BLACKJACK &hearts;</div>
  <div class="balance-bar">
    <span>Balance: $<span id="bal">500</span></span>
    <span id="bet-info">Bet: $<span id="cur-bet">0</span></span>
    <span>Wins: <span id="wins">0</span> | Losses: <span id="losses">0</span></span>
  </div>
  <div id="result-area"></div>
  <div class="hand-area">
    <div class="hand-label">Dealer <span class="score-badge" id="dealer-score"></span></div>
    <div class="cards-row" id="dealer-cards"></div>
  </div>
  <div class="hand-area">
    <div class="hand-label">You <span class="score-badge" id="player-score"></span></div>
    <div class="cards-row" id="player-cards"></div>
  </div>
  <div id="bet-phase">
    <div class="bet-display">Place your bet: $<span id="pending-bet">0</span></div>
    <div class="bet-area">
      <div class="chip c5" onclick="addBet(5)">$5</div>
      <div class="chip c10" onclick="addBet(10)">$10</div>
      <div class="chip c25" onclick="addBet(25)">$25</div>
      <div class="chip c50" onclick="addBet(50)">$50</div>
      <div class="chip c100" onclick="addBet(100)">$100</div>
    </div>
    <div class="controls">
      <button class="btn btn-outline" onclick="clearBet()">Clear</button>
      <button class="btn btn-gold" id="deal-btn" onclick="dealHand()">Deal &#9654;</button>
    </div>
    <div class="test-hands">
      <div class="test-title">Test Hands</div>
      <div class="test-buttons">
        <button class="btn btn-outline test-btn" onclick="loadTestHand('hard16')">Hard 16</button>
        <button class="btn btn-outline test-btn" onclick="loadTestHand('soft18')">Soft 18</button>
        <button class="btn btn-outline test-btn" onclick="loadTestHand('double11')">Double 11</button>
        <button class="btn btn-outline test-btn" onclick="loadTestHand('stand20')">Stand 20</button>
      </div>
    </div>
  </div>
  <div id="play-phase" style="display:none">
    <div class="controls">
      <button class="btn btn-gold" id="hit-btn" onclick="hit()">Hit</button>
      <button class="btn btn-outline" id="stand-btn" onclick="stand()">Stand</button>
      <button class="btn btn-outline" id="double-btn" onclick="doubleDown()">Double Down</button>
    </div>
  </div>
  <div id="end-phase" style="display:none">
    <div class="controls">
      <button class="btn btn-gold" onclick="newRound()">New Round</button>
      <button class="btn btn-red" onclick="resetGame()">Reset Game</button>
    </div>
  </div>
  <div class="ai-panel" id="ai-panel">
    <div class="ai-header">
      <strong>AI Odds</strong>
      <span id="ai-sim-count"></span>
    </div>
    <table class="ai-table">
      <thead>
        <tr>
          <th>Action</th>
          <th>Win</th>
          <th>Push</th>
          <th>Lose</th>
          <th>EV</th>
        </tr>
      </thead>
      <tbody id="ai-results"></tbody>
    </table>
    <div class="ai-recommendation" id="ai-recommendation"></div>
    <div class="ai-explanation" id="ai-explanation"></div>
  </div>
  <div class="msg" id="msg"></div>
</div>

<script src="blackjack-ai.js"></script>
<script src="blackjack.js"></script>
</body>
</html>
